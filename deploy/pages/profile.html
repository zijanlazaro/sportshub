<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Profile Setup</h1>
        <p class="text-slate-400">Configure your account and team assignment</p>
      </div>

      <div class="bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700">
        <form id="profileForm">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">First Name</label>
            <input type="text" id="firstName" required class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Last Name</label>
            <input type="text" id="lastName" required class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Middle Name (Optional)</label>
            <input type="text" id="middleName" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Suffix (Optional)</label>
            <input type="text" id="suffix" placeholder="Jr., Sr., III, etc." class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
            <input type="email" id="email" readonly class="w-full px-4 py-2 bg-slate-600 border border-slate-600 rounded-lg text-slate-400">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Role</label>
            <select id="role" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="player">Player</option>
              <option value="coach">Coach</option>
              <option value="medical_staff">Medical Staff</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-300 mb-2">Team</label>
            <select id="teamSelect" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="">Select a team...</option>
            </select>
          </div>

          <button type="submit" id="updateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition mb-4">
            Update Profile
          </button>

          <button type="button" id="dashboardBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
            Go to Dashboard
          </button>
        </form>

        <div id="message" class="hidden mt-4 p-4 rounded-lg text-sm"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { authManager } from '../js/auth.js';
    import { getUserProfile, updateUserProfile, getAllTeams } from '../js/profile.js';
    import { supabase } from '../js/supabaseClient.js';

    let currentUser = null;
    let currentProfile = null;

    async function init() {
      try {
        // Initialize auth manager
        await authManager.init();
        
        // Get current user
        currentUser = authManager.getUser();
        
        if (!currentUser) {
          showMessage('Please login first', 'error');
          setTimeout(() => {
            window.location.href = './login.html';
          }, 2000);
          return;
        }

        console.log('Current user:', currentUser.email);
        
        await loadUserProfile();
        await loadTeams();
        populateForm();
      } catch (error) {
        console.error('Initialization failed:', error);
        showMessage('Failed to initialize profile page: ' + error.message, 'error');
      }
    }

    async function loadUserProfile() {
      try {
        currentProfile = await getUserProfile(currentUser.id);
        console.log('Loaded profile:', currentProfile);
      } catch (error) {
        console.error('Failed to load profile:', error);
        showMessage('Failed to load profile: ' + error.message, 'error');
        
        // Create basic profile if it doesn't exist
        currentProfile = {
          id: currentUser.id,
          email: currentUser.email,
          first_name: '',
          last_name: '',
          role: 'player'
        };
      }
    }

    async function loadTeams() {
      try {
        const teams = await getAllTeams();
        const select = document.getElementById('teamSelect');
        
        teams.forEach(team => {
          const option = document.createElement('option');
          option.value = team.id;
          option.textContent = `${team.name} (${team.sport})`;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load teams:', error);
        showMessage('Failed to load teams: ' + error.message, 'error');
      }
    }

    function populateForm() {
      if (currentProfile) {
        document.getElementById('firstName').value = currentProfile.first_name || '';
        document.getElementById('lastName').value = currentProfile.last_name || '';
        document.getElementById('middleName').value = currentProfile.middle_name || '';
        document.getElementById('suffix').value = currentProfile.suffix || '';
        document.getElementById('email').value = currentProfile.email || currentUser.email;
        document.getElementById('role').value = currentProfile.role || 'player';
        document.getElementById('teamSelect').value = currentProfile.team_id || '';
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!currentUser) {
        showMessage('Please login first', 'error');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const profileData = {
        first_name: document.getElementById('firstName').value.trim(),
        last_name: document.getElementById('lastName').value.trim(),
        middle_name: document.getElementById('middleName').value.trim() || null,
        suffix: document.getElementById('suffix').value.trim() || null,
        role: document.getElementById('role').value,
        team_id: document.getElementById('teamSelect').value || null
      };

      try {
        console.log('Updating profile with data:', profileData);
        
        const updatedProfile = await updateUserProfile(currentUser.id, profileData);
        currentProfile = updatedProfile;
        
        // Refresh auth manager profile
        await authManager.refreshProfile();
        
        showMessage('Profile updated successfully!', 'success');
        
        // Show notification
        showNotification('Profile updated successfully!', 'success');
        
        // Refresh the form with updated data
        setTimeout(() => {
          populateForm();
        }, 1000);
        
      } catch (error) {
        console.error('Update error:', error);
        showMessage('Failed to update profile: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Profile';
      }
    });

    document.getElementById('dashboardBtn').addEventListener('click', () => {
      window.location.href = './dashboard.html';
    });

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `mt-4 p-4 rounded-lg text-sm ${
        type === 'success' ? 'bg-green-900 border border-green-700 text-green-200' : 
        'bg-red-900 border border-red-700 text-red-200'
      }`;
      messageDiv.classList.remove('hidden');
      
      if (type === 'success') {
        setTimeout(() => messageDiv.classList.add('hidden'), 5000);
      }
    }

    function showNotification(message, type) {
      const notification = document.createElement('div');
      notification.className = `fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 ${
        type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
      }`;
      notification.innerHTML = `
        <div class="flex items-center gap-2">
          <i class="fas ${
            type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'
          }"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 4000);
    }

    // Initialize when page loads
    init();
  </script>
</body>
</html>
