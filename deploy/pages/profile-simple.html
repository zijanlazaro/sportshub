<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Profile Setup</h1>
        <p class="text-slate-400">Configure your account and team assignment</p>
      </div>

      <div class="bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700">
        <form id="profileForm">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">First Name</label>
            <input type="text" id="firstName" required class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Last Name</label>
            <input type="text" id="lastName" required class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
            <input type="email" id="email" readonly class="w-full px-4 py-2 bg-slate-600 border border-slate-600 rounded-lg text-slate-400">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Role</label>
            <select id="role" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="player">Player</option>
              <option value="coach">Coach</option>
              <option value="medical_staff">Medical Staff</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-300 mb-2">Team</label>
            <select id="teamSelect" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="">Select a team...</option>
            </select>
          </div>

          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition mb-4">
            Update Profile
          </button>

          <button type="button" id="dashboardBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
            Go to Dashboard
          </button>
        </form>

        <div id="message" class="hidden mt-4 p-4 rounded-lg text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://guyppjhpjfzrfxldltjz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1eXBwamhwamZ6cmZ4bGRsdGp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MDI1OTIsImV4cCI6MjA4NDQ3ODU5Mn0.6hUP3Ur2FYxBtZCb8SYz1cWq8VnIuzhdxvT1-tAtIC4';

    async function loadTeams() {
      try {
        const response = await fetch(`${supabaseUrl}/rest/v1/teams?select=id,name,sport`, {
          headers: {
            'apikey': supabaseKey,
            'Authorization': `Bearer ${supabaseKey}`
          }
        });
        
        const teams = await response.json();
        const select = document.getElementById('teamSelect');
        
        teams.forEach(team => {
          const option = document.createElement('option');
          option.value = team.id;
          option.textContent = `${team.name} (${team.sport})`;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load teams:', error);
      }
    }

    // Set some default values for testing - you can change these
    document.getElementById('email').value = 'coach@example.com';
    document.getElementById('firstName').value = 'Coach';
    document.getElementById('lastName').value = 'Smith';
    document.getElementById('role').value = 'coach';

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const role = document.getElementById('role').value;
      const teamId = document.getElementById('teamSelect').value || null;

      // For now, just show success message
      // In a real app, this would update the database
      showMessage('Profile settings saved! You can now go to dashboard.', 'success');
    });

    document.getElementById('dashboardBtn').addEventListener('click', () => {
      window.location.href = '/src/pages/dashboard.html';
    });

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `mt-4 p-4 rounded-lg text-sm ${
        type === 'success' ? 'bg-green-900 border border-green-700 text-green-200' : 
        'bg-red-900 border border-red-700 text-red-200'
      }`;
      messageDiv.classList.remove('hidden');
      
      if (type === 'success') {
        setTimeout(() => messageDiv.classList.add('hidden'), 3000);
      }
    }

    // Load teams when page loads
    loadTeams();
  </script>
</body>
</html>
