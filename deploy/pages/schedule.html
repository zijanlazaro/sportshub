<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-3xl font-bold">Schedule & Events</h1>
          <p class="text-slate-400">Manage team calendar and events</p>
        </div>
        <div class="flex gap-4">
          <button id="addEventBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">
            <i class="fas fa-plus mr-2"></i> Add Event
          </button>
          <a href="./dashboard.html" class="bg-slate-600 hover:bg-slate-700 px-4 py-2 rounded-lg transition">
            <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
          </a>
        </div>
      </div>

      <!-- Calendar View -->
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Calendar -->
        <div class="lg:col-span-3 bg-slate-800 rounded-lg border border-slate-700 p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">Calendar</h2>
            <div class="flex gap-2">
              <button id="prevMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-left"></i>
              </button>
              <span id="currentMonth" class="px-4 py-1 bg-slate-700 rounded font-medium"></span>
              <button id="nextMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-1">
            <!-- Calendar will be generated here -->
          </div>
        </div>

        <!-- Upcoming Events -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
          <h3 class="text-lg font-semibold mb-4">Upcoming Events</h3>
          <div id="upcomingEvents" class="space-y-3">
            <p class="text-slate-400">No upcoming events</p>
          </div>
        </div>
      </div>

      <!-- Events List -->
      <div class="mt-6 bg-slate-800 rounded-lg border border-slate-700 p-6">
        <h3 class="text-lg font-semibold mb-4">All Events</h3>
        <div id="eventsList" class="space-y-3">
          <p class="text-slate-400">No events found</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    console.log('Schedule script loaded');
    
    let currentDate = new Date();
    let events = [];

    // Render calendar
    function renderCalendar() {
      console.log('Rendering calendar...');
      const monthNames = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];
      
      document.getElementById('currentMonth').textContent = 
        `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      const calendarGrid = document.getElementById('calendarGrid');
      calendarGrid.innerHTML = '';

      // Day headers
      const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      dayHeaders.forEach(day => {
        const dayHeader = document.createElement('div');
        dayHeader.className = 'p-2 text-center text-slate-400 font-medium text-sm';
        dayHeader.textContent = day;
        calendarGrid.appendChild(dayHeader);
      });

      // Calendar days
      for (let i = 0; i < 42; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);
        
        const dayElement = document.createElement('div');
        dayElement.className = `p-2 text-center cursor-pointer rounded transition ${
          date.getMonth() === currentDate.getMonth() 
            ? 'text-white hover:bg-slate-700' 
            : 'text-slate-500'
        }`;
        
        dayElement.innerHTML = `<div class="text-sm">${date.getDate()}</div>`;
        calendarGrid.appendChild(dayElement);
      }
    }

    // Calendar navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Add event button
    document.getElementById('addEventBtn').addEventListener('click', () => {
      alert('Add Event functionality - Coming soon!');
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM loaded, rendering calendar...');
      renderCalendar();
    });

    // Render immediately if DOM already loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderCalendar);
    } else {
      renderCalendar();
    }
  </script>
</body>
</html>
