<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Profile Debug - Sports Hub</title>\n  <script src=\"https://cdn.tailwindcss.com\"></script>\n</head>\n<body class=\"bg-slate-900 text-slate-100 p-8\">\n  <div class=\"max-w-4xl mx-auto\">\n    <h1 class=\"text-3xl font-bold mb-6\">Profile Debug Tool</h1>\n    \n    <div class=\"grid grid-cols-1 md:grid-cols-2 gap-6\">\n      <!-- Auth Status -->\n      <div class=\"bg-slate-800 p-6 rounded-lg\">\n        <h2 class=\"text-xl font-semibold mb-4\">Authentication Status</h2>\n        <div id=\"authStatus\" class=\"space-y-2\"></div>\n        <button id=\"refreshAuth\" class=\"mt-4 bg-blue-600 px-4 py-2 rounded\">Refresh Auth</button>\n      </div>\n      \n      <!-- Profile Data -->\n      <div class=\"bg-slate-800 p-6 rounded-lg\">\n        <h2 class=\"text-xl font-semibold mb-4\">Profile Data</h2>\n        <div id=\"profileData\" class=\"space-y-2\"></div>\n        <button id=\"loadProfile\" class=\"mt-4 bg-green-600 px-4 py-2 rounded\">Load Profile</button>\n      </div>\n      \n      <!-- Test Update -->\n      <div class=\"bg-slate-800 p-6 rounded-lg md:col-span-2\">\n        <h2 class=\"text-xl font-semibold mb-4\">Test Profile Update</h2>\n        <div class=\"grid grid-cols-2 gap-4 mb-4\">\n          <input id=\"testFirstName\" placeholder=\"First Name\" class=\"bg-slate-700 p-2 rounded\">\n          <input id=\"testLastName\" placeholder=\"Last Name\" class=\"bg-slate-700 p-2 rounded\">\n        </div>\n        <button id=\"testUpdate\" class=\"bg-purple-600 px-4 py-2 rounded\">Test Update</button>\n        <div id=\"updateResult\" class=\"mt-4\"></div>\n      </div>\n      \n      <!-- Console Log -->\n      <div class=\"bg-slate-800 p-6 rounded-lg md:col-span-2\">\n        <h2 class=\"text-xl font-semibold mb-4\">Debug Log</h2>\n        <div id=\"debugLog\" class=\"bg-slate-900 p-4 rounded text-sm font-mono h-64 overflow-y-auto\"></div>\n        <button id=\"clearLog\" class=\"mt-2 bg-red-600 px-4 py-2 rounded\">Clear Log</button>\n      </div>\n    </div>\n  </div>\n\n  <script type=\"module\">\n    import { authManager } from '../js/auth.js';\n    import { getUserProfile, updateUserProfile } from '../js/profile.js';\n    import { supabase } from '../js/supabaseClient.js';\n\n    let currentUser = null;\n    let currentProfile = null;\n\n    function log(message, type = 'info') {\n      const logDiv = document.getElementById('debugLog');\n      const timestamp = new Date().toLocaleTimeString();\n      const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-blue-400';\n      logDiv.innerHTML += `<div class=\"${color}\">[${timestamp}] ${message}</div>`;\n      logDiv.scrollTop = logDiv.scrollHeight;\n      console.log(`[${timestamp}] ${message}`);\n    }\n\n    async function refreshAuthStatus() {\n      try {\n        log('Refreshing auth status...');\n        \n        // Get session directly from Supabase\n        const { data: { session } } = await supabase.auth.getSession();\n        const { data: { user } } = await supabase.auth.getUser();\n        \n        currentUser = authManager.getUser();\n        \n        const authDiv = document.getElementById('authStatus');\n        authDiv.innerHTML = `\n          <div><strong>Session:</strong> ${session ? '✅ Active' : '❌ None'}</div>\n          <div><strong>User (direct):</strong> ${user ? user.email : '❌ None'}</div>\n          <div><strong>User (auth manager):</strong> ${currentUser ? currentUser.email : '❌ None'}</div>\n          <div><strong>User ID:</strong> ${user?.id || 'None'}</div>\n        `;\n        \n        log(`Auth status: Session=${!!session}, User=${!!user}, AuthManager=${!!currentUser}`, 'success');\n      } catch (error) {\n        log(`Auth refresh failed: ${error.message}`, 'error');\n      }\n    }\n\n    async function loadProfileData() {\n      try {\n        log('Loading profile data...');\n        \n        if (!currentUser) {\n          log('No authenticated user found', 'error');\n          return;\n        }\n        \n        currentProfile = await getUserProfile(currentUser.id);\n        \n        const profileDiv = document.getElementById('profileData');\n        profileDiv.innerHTML = `\n          <div><strong>ID:</strong> ${currentProfile.id}</div>\n          <div><strong>Email:</strong> ${currentProfile.email}</div>\n          <div><strong>Name:</strong> ${currentProfile.first_name} ${currentProfile.last_name}</div>\n          <div><strong>Role:</strong> ${currentProfile.role}</div>\n          <div><strong>Team ID:</strong> ${currentProfile.team_id || 'None'}</div>\n          <div><strong>Updated:</strong> ${currentProfile.updated_at}</div>\n        `;\n        \n        // Populate test fields\n        document.getElementById('testFirstName').value = currentProfile.first_name || '';\n        document.getElementById('testLastName').value = currentProfile.last_name || '';\n        \n        log('Profile loaded successfully', 'success');\n      } catch (error) {\n        log(`Profile load failed: ${error.message}`, 'error');\n      }\n    }\n\n    async function testProfileUpdate() {\n      try {\n        log('Testing profile update...');\n        \n        if (!currentUser) {\n          log('No authenticated user for update', 'error');\n          return;\n        }\n        \n        const firstName = document.getElementById('testFirstName').value;\n        const lastName = document.getElementById('testLastName').value;\n        \n        const updateData = {\n          first_name: firstName,\n          last_name: lastName,\n          role: currentProfile?.role || 'player',\n          team_id: currentProfile?.team_id || null\n        };\n        \n        log(`Updating with data: ${JSON.stringify(updateData)}`);\n        \n        const updatedProfile = await updateUserProfile(currentUser.id, updateData);\n        \n        document.getElementById('updateResult').innerHTML = `\n          <div class=\"text-green-400\">✅ Update successful!</div>\n          <div class=\"text-sm mt-2\">${JSON.stringify(updatedProfile, null, 2)}</div>\n        `;\n        \n        log('Profile update successful', 'success');\n        \n        // Check if session is still valid\n        const { data: { user } } = await supabase.auth.getUser();\n        if (user) {\n          log('Session still valid after update ✅', 'success');\n        } else {\n          log('Session lost after update ❌', 'error');\n        }\n        \n        // Refresh displays\n        await refreshAuthStatus();\n        await loadProfileData();\n        \n      } catch (error) {\n        document.getElementById('updateResult').innerHTML = `\n          <div class=\"text-red-400\">❌ Update failed: ${error.message}</div>\n        `;\n        log(`Profile update failed: ${error.message}`, 'error');\n      }\n    }\n\n    // Event listeners\n    document.getElementById('refreshAuth').addEventListener('click', refreshAuthStatus);\n    document.getElementById('loadProfile').addEventListener('click', loadProfileData);\n    document.getElementById('testUpdate').addEventListener('click', testProfileUpdate);\n    document.getElementById('clearLog').addEventListener('click', () => {\n      document.getElementById('debugLog').innerHTML = '';\n    });\n\n    // Initialize\n    async function init() {\n      log('Initializing debug tool...');\n      \n      try {\n        await authManager.init();\n        await refreshAuthStatus();\n        \n        if (currentUser) {\n          await loadProfileData();\n        }\n        \n        log('Debug tool initialized', 'success');\n      } catch (error) {\n        log(`Initialization failed: ${error.message}`, 'error');\n      }\n    }\n\n    init();\n  </script>\n</body>\n</html>
