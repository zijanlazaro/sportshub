<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Hub - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .tab-form { animation: fadeIn 0.3s ease-in; }
    .tab-form.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .bg-primary { background-color: #1e40af; }
    input, select { background-color: #334155 !important; color: #f8fafc !important; border-color: #475569 !important; }
    input::placeholder { color: #94a3b8 !important; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-lg">
      <div class="text-center mb-6">
        <div class="flex justify-center mb-4">
          <div class="bg-primary p-4 rounded-full">
            <i class="fas fa-basketball-ball text-white text-3xl"></i>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-white mb-1">Sports Hub</h1>
        <p class="text-slate-400">Athlete Management System</p>
      </div>

      <div class="bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
        <!-- Tabs -->
        <div class="mb-6">
          <ul class="flex gap-4 border-b border-slate-700">
            <li class="flex-1">
              <button class="auth-tab w-full pb-3 text-center text-white font-semibold border-b-2 border-blue-500" data-tab="login">Sign In</button>
            </li>
            <li class="flex-1">
              <button class="auth-tab w-full pb-3 text-center text-slate-400 hover:text-white transition" data-tab="register">Sign Up</button>
            </li>
          </ul>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="tab-form" data-tab="login">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
            <input type="email" id="loginEmail" required placeholder="your@email.com"
              class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
            <input type="password" id="loginPassword" required placeholder="••••••••"
              class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="tab-form hidden" data-tab="register">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">First Name <span class="text-red-400">*</span></label>
              <input type="text" id="regFirstName" required placeholder="Juan"
                class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Last Name <span class="text-red-400">*</span></label>
              <input type="text" id="regLastName" required placeholder="Dela Cruz"
                class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
            </div>
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Email Address <span class="text-red-400">*</span></label>
            <input type="email" id="regEmail" required placeholder="your@email.com"
              class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Role <span class="text-red-400">*</span></label>
            <select id="regRole" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
              <option value="admin">Admin</option>
              <option value="coach">Coach</option>
              <option value="medical_staff">Medical Staff</option>
              <option value="team_manager">Team Manager</option>
              <option value="game_official">Game Official</option>
              <option value="player" selected>Player</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">Select Team <span id="teamRequiredMark" class="text-red-400 hidden">*</span></label>
            <select id="regTeam" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
              <option value="">-- No Team / Select Later --</option>
            </select>
            <p id="teamRequiredHint" class="hidden mt-1 text-xs text-yellow-400"><i class="fas fa-exclamation-triangle mr-1"></i>Team is required for Medical Staff</p>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Password <span class="text-red-400">*</span></label>
              <input type="password" id="regPassword" required placeholder="Min. 6 chars"
                class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Confirm Password <span class="text-red-400">*</span></label>
              <input type="password" id="regConfirm" required placeholder="Repeat password"
                class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:border-blue-500">
            </div>
          </div>

          <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition">
            <i class="fas fa-user-plus mr-2"></i>Create Account
          </button>
        </form>

        <div id="authError" class="hidden mt-4 p-3 bg-red-900 border border-red-700 rounded-lg text-red-200 text-sm"></div>
        <div id="authSuccess" class="hidden mt-4 p-3 bg-green-900 border border-green-700 rounded-lg text-green-200 text-sm"></div>
      </div>

      <p class="text-center text-slate-500 text-sm mt-6">Sports Hub v2.0 &mdash; Thesis Project</p>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabaseClient.js';

    // Load teams for registration dropdown
    async function loadTeams() {
      const { data } = await supabase.from('teams').select('id, name').order('name');
      const sel = document.getElementById('regTeam');
      (data || []).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name;
        sel.appendChild(opt);
      });
    }
    loadTeams();

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(btn => {
      btn.addEventListener('click', function() {
        const tab = this.dataset.tab;
        document.querySelectorAll('.auth-tab').forEach(b => {
          const active = b.dataset.tab === tab;
          b.classList.toggle('border-b-2', active);
          b.classList.toggle('border-blue-500', active);
          b.classList.toggle('text-white', active);
          b.classList.toggle('font-semibold', active);
          b.classList.toggle('text-slate-400', !active);
        });
        document.querySelectorAll('.tab-form').forEach(f => {
          f.classList.toggle('hidden', f.dataset.tab !== tab);
        });
      });
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Signing in...';
      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await supabase.from('users').update({ last_login: new Date().toISOString() }).eq('id', (await supabase.auth.getUser()).data.user.id);
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => window.location.href = '/src/pages/dashboard.html', 1200);
      } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
      }
    });

    // Register
    // Show team required hint when medical_staff is selected
    document.getElementById('regRole').addEventListener('change', function() {
      const isMedical = this.value === 'medical_staff';
      document.getElementById('teamRequiredMark').classList.toggle('hidden', !isMedical);
      document.getElementById('teamRequiredHint').classList.toggle('hidden', !isMedical);
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const firstName = document.getElementById('regFirstName').value.trim();
      const lastName = document.getElementById('regLastName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const role = document.getElementById('regRole').value;
      const teamId = document.getElementById('regTeam').value || null;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;

      if (password !== confirm) { showError('Passwords do not match'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
      if (role === 'medical_staff' && !teamId) { showError('Medical Staff must be assigned to a team.'); return; }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating account...';

      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        if (data.user) {
          const { error: profileError } = await supabase.from('users').insert({
            id: data.user.id,
            email,
            first_name: firstName,
            last_name: lastName,
            full_name: `${firstName} ${lastName}`,
            role,
            team_id: teamId,
            active: true
          });
          if (profileError) throw profileError;
        }
        showSuccess('Account created! You can now sign in.');
        setTimeout(() => document.querySelector('[data-tab="login"]').click(), 1500);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>Create Account';
      }
    });

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg; el.classList.remove('hidden');
    }
    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = msg; el.classList.remove('hidden');
    }
    function clearMsg() {
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authSuccess').classList.add('hidden');
    }
  </script>
</body>
</html>
