<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Hub - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <!-- Logo & Header -->
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="bg-primary p-4 rounded-full">
            <i class="fas fa-basketball-ball text-white text-3xl"></i>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Sports Hub</h1>
        <p class="text-slate-400">Athlete Management System</p>
      </div>

      <!-- Login Form -->
      <div class="bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700">
        <div class="mb-6">
          <ul class="flex gap-4 border-b border-slate-700">
            <li class="flex-1">
              <button class="login-tab w-full pb-3 text-center text-white font-semibold border-b-2 border-blue-500" data-tab="login">
                Login
              </button>
            </li>
            <li class="flex-1">
              <button class="login-tab w-full pb-3 text-center text-slate-400 hover:text-white transition" data-tab="register">
                Register
              </button>
            </li>
          </ul>
        </div>

        <!-- Login Tab -->
        <form id="loginForm" class="login-form-tab" data-tab="login">
          <div class="mb-4">
            <label for="loginEmail" class="block text-sm font-medium text-slate-300 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="loginEmail"
              name="email"
              required
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
              placeholder="your@email.com"
            >
          </div>

          <div class="mb-6">
            <label for="loginPassword" class="block text-sm font-medium text-slate-300 mb-2">
              Password
            </label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              required
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
              placeholder="••••••••"
            >
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition mb-4"
          >
            Sign In
          </button>

          <a href="#" class="text-sm text-blue-400 hover:text-blue-300 text-center block">
            Forgot password?
          </a>
        </form>

        <!-- Register Tab -->
        <form id="registerForm" class="login-form-tab hidden" data-tab="register">
          <div class="mb-4">
            <label for="regEmail" class="block text-sm font-medium text-slate-300 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="regEmail"
              name="email"
              required
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
              placeholder="your@email.com"
            >
          </div>

          <div class="mb-4">
            <label for="regRole" class="block text-sm font-medium text-slate-300 mb-2">
              Role
            </label>
            <select
              id="regRole"
              name="role"
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500"
            >
              <option value="player">Player</option>
              <option value="coach">Coach</option>
              <option value="medical_staff">Medical Staff</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="regPassword" class="block text-sm font-medium text-slate-300 mb-2">
              Password
            </label>
            <input
              type="password"
              id="regPassword"
              name="password"
              required
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
              placeholder="••••••••"
            >
          </div>

          <div class="mb-6">
            <label for="regConfirm" class="block text-sm font-medium text-slate-300 mb-2">
              Confirm Password
            </label>
            <input
              type="password"
              id="regConfirm"
              name="confirm_password"
              required
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500"
              placeholder="••••••••"
            >
          </div>

          <button
            type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition"
          >
            Create Account
          </button>
        </form>

        <!-- Error Message -->
        <div id="authError" class="hidden mt-4 p-4 bg-red-900 border border-red-700 rounded-lg text-red-200 text-sm"></div>

        <!-- Success Message -->
        <div id="authSuccess" class="hidden mt-4 p-4 bg-green-900 border border-green-700 rounded-lg text-green-200 text-sm"></div>
      </div>

      <!-- Footer -->
      <p class="text-center text-slate-400 text-sm mt-8">
        Sports Hub v1.0 | For thesis purposes
      </p>
    </div>
  </div>

  <!-- CSS for animations -->
  <style>
    .login-form-tab {
      animation: fadeIn 0.3s ease-in;
    }

    .login-form-tab.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .bg-primary {
      background-color: #1e40af;
    }
  </style>

  <script type="module">
    import { authManager } from '../js/auth.js';

    // Tab switching
    document.querySelectorAll('.login-tab').forEach(btn => {
      btn.addEventListener('click', function() {
        const tab = this.dataset.tab;
        
        document.querySelectorAll('.login-tab').forEach(b => {
          b.classList.toggle('border-b-2', b.dataset.tab === tab);
          b.classList.toggle('border-blue-500', b.dataset.tab === tab);
          b.classList.toggle('text-slate-400', b.dataset.tab !== tab);
          b.classList.toggle('text-white', b.dataset.tab === tab);
          b.classList.toggle('hover:text-white', b.dataset.tab !== tab);
        });

        document.querySelectorAll('.login-form-tab').forEach(f => {
          f.classList.toggle('hidden', f.dataset.tab !== tab);
        });
      });
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        await authManager.login(email, password);
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => window.location.href = '/src/pages/dashboard.html', 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // Register form handler
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const email = document.getElementById('regEmail').value;
      const role = document.getElementById('regRole').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      try {
        await authManager.register(email, password, role);
        showSuccess('Registration successful! You can now login.');
        // Switch to login tab after successful registration
        setTimeout(() => {
          document.querySelector('[data-tab="login"]').click();
        }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    function showError(message) {
      const errorDiv = document.getElementById('authError');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('authSuccess');
      successDiv.textContent = message;
      successDiv.classList.remove('hidden');
    }

    function clearMessages() {
      document.getElementById('authError').classList.add('hidden');
      document.getElementById('authSuccess').classList.add('hidden');
    }
  </script>
</body>
</html>
