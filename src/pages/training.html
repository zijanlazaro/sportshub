<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100">
<div class="flex h-screen">
  <button id="mobileMenuBtn" class="lg:hidden fixed top-4 left-4 z-50 bg-slate-800 p-2 rounded-lg">
    <i class="fas fa-bars text-white"></i>
  </button>

  <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-slate-800 border-r border-slate-700 overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-transform">
    <div class="p-6 border-b border-slate-700">
      <div class="flex items-center gap-3 mb-2">
        <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-basketball-ball text-white"></i></div>
        <h1 class="text-xl font-bold">Sports Hub</h1>
      </div>
      <p id="userRole" class="text-xs text-slate-400">Loading...</p>
    </div>
    <nav class="p-4 space-y-2">
      <a href="./dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-chart-line mr-2"></i> Overview</a>
      <a href="./dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-users mr-2"></i> Players</a>
      <a id="navTraining" href="#" class="block px-4 py-2 rounded-lg bg-blue-600 text-white"><i class="fas fa-dumbbell mr-2"></i> Training</a>
      <a href="./medical.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-hospital mr-2"></i> Medical</a>
      <a href="./schedule.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-calendar mr-2"></i> Schedule</a>
      <a href="./dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-users-cog mr-2"></i> Manage Teams</a>
    </nav>
    <div class="p-4 border-t border-slate-700">
      <button id="logoutBtn" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
        <i class="fas fa-sign-out-alt mr-2"></i> Logout
      </button>
    </div>
  </aside>

  <div id="overlay" class="lg:hidden fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>

  <main class="flex-1 overflow-y-auto">
    <header class="bg-slate-800 border-b border-slate-700 p-4 lg:p-6 pl-16 lg:pl-6 flex justify-between items-center sticky top-0 z-20">
      <h1 class="text-xl lg:text-2xl font-bold">Training & Attendance</h1>
      <div class="flex items-center gap-3">
        <input type="date" id="sessionDate" class="bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm text-white">
        <button id="markAttendanceBtn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm transition">
          <i class="fas fa-clipboard-check mr-2"></i>Mark Attendance
        </button>
      </div>
    </header>

    <div class="p-4 lg:p-6 space-y-6">

      <!-- Tabs -->
      <div class="flex gap-2 border-b border-slate-700 pb-0">
        <button class="tab-btn active px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-white" data-tab="attendance">
          <i class="fas fa-clipboard-list mr-2"></i>Attendance
        </button>
        <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="progress">
          <i class="fas fa-chart-bar mr-2"></i>Player Progress
        </button>
        <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-white" data-tab="history">
          <i class="fas fa-history mr-2"></i>History
        </button>
      </div>

      <!-- ATTENDANCE TAB -->
      <div id="tab-attendance" class="tab-content">
        <div id="promotionAlert" class="hidden mb-4 p-4 bg-green-900 border border-green-600 rounded-lg text-green-200 text-sm"></div>

        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
          <div class="bg-slate-700 px-6 py-3 flex justify-between items-center">
            <span class="text-sm font-semibold">Players — <span id="attendanceDateLabel"></span></span>
            <span class="text-xs text-slate-400" id="attendanceSummary"></span>
          </div>
          <div id="attendanceList" class="divide-y divide-slate-700">
            <div class="px-6 py-4 text-slate-400 text-sm">Loading players...</div>
          </div>
          <div id="saveAttendanceBar" class="hidden px-6 py-4 bg-slate-700 flex justify-end gap-3">
            <button id="saveAttendanceBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg text-sm font-medium transition">
              <i class="fas fa-save mr-2"></i>Save Attendance
            </button>
          </div>
        </div>
      </div>

      <!-- PROGRESS TAB -->
      <div id="tab-progress" class="tab-content hidden">
        <div id="progressGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          <div class="text-slate-400 text-sm">Loading...</div>
        </div>
      </div>

      <!-- HISTORY TAB -->
      <div id="tab-history" class="tab-content hidden">
        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-slate-700">
              <tr>
                <th class="px-4 py-3 text-left">Date</th>
                <th class="px-4 py-3 text-left">Player</th>
                <th class="px-4 py-3 text-left">Status</th>
                <th class="px-4 py-3 text-left">Session</th>
              </tr>
            </thead>
            <tbody id="historyBody" class="divide-y divide-slate-700">
              <tr><td colspan="4" class="px-4 py-4 text-slate-400">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script type="module">
  import { supabase } from '../js/supabaseClient.js';
  import { getPlayerProgressReport, checkAndPromotePlayer } from '../js/players.js';

  const TRAINING_VIEW_ROLES   = ['admin','team_manager','coach','player'];
  const TRAINING_MANAGE_ROLES = ['admin','team_manager','coach'];

  let currentUser = null, currentTeam = null, players = [], userRole = null;
  let attendanceMap = {};

  function can(roles) { return roles.includes(userRole); }

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = './login.html'; return; }
    currentUser = user;

    const { data: profile } = await supabase.from('users').select('team_id, role').eq('id', user.id).single();
    userRole = profile?.role || null;
    document.getElementById('userRole').textContent = (userRole || 'user').replace('_',' ').toUpperCase();

    if (!can(TRAINING_VIEW_ROLES)) {
      document.querySelector('main').innerHTML = `
        <div class="flex items-center justify-center h-full">
          <div class="text-center">
            <i class="fas fa-lock text-4xl text-slate-500 mb-4"></i>
            <p class="text-slate-400">You do not have access to Training.</p>
            <a href="./dashboard.html" class="mt-4 inline-block text-blue-400 hover:underline">Back to Dashboard</a>
          </div>
        </div>`;
      return;
    }

    if (!can(TRAINING_MANAGE_ROLES)) {
      document.getElementById('markAttendanceBtn')?.classList.add('hidden');
      document.getElementById('saveAttendanceBar')?.classList.add('hidden');
    }

    if (profile?.team_id) {
      const { data: team } = await supabase.from('teams').select('*').eq('id', profile.team_id).single();
      currentTeam = team;
    }

    document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('attendanceDateLabel').textContent = formatDate(document.getElementById('sessionDate').value);

    await loadPlayers();
    await renderAttendanceTab();
  }

  async function loadPlayers() {
    if (!currentTeam) return;
    const { data } = await supabase.from('players').select('*').eq('team_id', currentTeam.id).order('jersey_number');
    players = data || [];
  }

  // ── ATTENDANCE TAB ──────────────────────────────────────────────
  async function renderAttendanceTab() {
    if (!players.length) {
      document.getElementById('attendanceList').innerHTML = '<div class="px-6 py-4 text-slate-400 text-sm">No players found.</div>';
      return;
    }

    const date = document.getElementById('sessionDate').value;

    // Load existing attendance for this date
    const { data: existing } = await supabase
      .from('training_attendance')
      .select('player_id, attendance_status, training_sessions!inner(session_date)')
      .eq('training_sessions.session_date', date)
      .in('player_id', players.map(p => p.id));

    attendanceMap = {};
    (existing || []).forEach(r => { attendanceMap[r.player_id] = r.attendance_status; });

    const list = document.getElementById('attendanceList');
    list.innerHTML = players.map(p => {
      const status = attendanceMap[p.id] || 'present';
      return `
        <div class="px-6 py-4 flex items-center justify-between gap-4" id="row-${p.id}">
          <div class="flex items-center gap-3">
            ${p.photo_url
              ? `<img src="${p.photo_url}" class="w-10 h-10 rounded-full object-cover border border-slate-600">`
              : `<div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-slate-400"><i class="fas fa-user"></i></div>`}
            <div>
              <div class="font-medium">${p.first_name} ${p.last_name}</div>
              <div class="text-xs text-slate-400">#${p.jersey_number} · ${p.position} · <span class="status-badge-${p.id}">${statusBadge(p.status || 'Tryout')}</span></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="setAttendance('${p.id}','present')" class="att-btn att-present-${p.id} px-3 py-1.5 rounded text-xs font-medium transition ${status==='present'?'bg-green-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">
              <i class="fas fa-check mr-1"></i>Present
            </button>
            <button onclick="setAttendance('${p.id}','absent')" class="att-btn att-absent-${p.id} px-3 py-1.5 rounded text-xs font-medium transition ${status==='absent'?'bg-red-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">
              <i class="fas fa-times mr-1"></i>Absent
            </button>
            <button onclick="setAttendance('${p.id}','excused')" class="att-btn att-excused-${p.id} px-3 py-1.5 rounded text-xs font-medium transition ${status==='excused'?'bg-yellow-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">
              <i class="fas fa-minus mr-1"></i>Excused
            </button>
          </div>
        </div>`;
    }).join('');

    updateAttendanceSummary();
    document.getElementById('saveAttendanceBar').classList.remove('hidden');
  }

  window.setAttendance = (playerId, status) => {
    attendanceMap[playerId] = status;
    ['present','absent','excused'].forEach(s => {
      const btn = document.querySelector(`.att-${s}-${playerId}`);
      if (!btn) return;
      btn.className = btn.className.replace(/bg-(green|red|yellow|slate)-\d+\s?/g, '').replace('text-white','text-slate-400');
      if (s === status) {
        const color = s==='present'?'green':s==='absent'?'red':'yellow';
        btn.classList.add(`bg-${color}-600`, 'text-white');
        btn.classList.remove('text-slate-400');
      } else {
        btn.classList.add('bg-slate-700', 'text-slate-400');
      }
    });
    updateAttendanceSummary();
  };

  function updateAttendanceSummary() {
    const vals = Object.values(attendanceMap);
    const present = vals.filter(v=>v==='present').length;
    const absent = vals.filter(v=>v==='absent').length;
    const excused = vals.filter(v=>v==='excused').length;
    document.getElementById('attendanceSummary').textContent =
      `Present: ${present} · Absent: ${absent} · Excused: ${excused}`;
  }

  document.getElementById('saveAttendanceBtn').addEventListener('click', async () => {
    if (!can(TRAINING_MANAGE_ROLES)) {
      showToast('Only Coaches can save attendance.', 'red');
      return;
    }
    const date = document.getElementById('sessionDate').value;
    const btn = document.getElementById('saveAttendanceBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';

    try {
      // Upsert a single training session for this date
      const { data: session, error: sErr } = await supabase
        .from('training_sessions')
        .upsert({ team_id: currentTeam.id, created_by: currentUser.id, session_date: date, topic: 'Daily Training' },
          { onConflict: 'team_id,session_date' })
        .select().single();
      if (sErr) throw sErr;

      // Upsert attendance for each player
      const rows = players.map(p => ({
        training_session_id: session.id,
        player_id: p.id,
        attendance_status: attendanceMap[p.id] || 'present'
      }));

      const { error: aErr } = await supabase
        .from('training_attendance')
        .upsert(rows, { onConflict: 'training_session_id,player_id' });
      if (aErr) throw aErr;

      // Update streak on players table & check promotions
      const promotions = [];
      for (const p of players) {
        // Recalculate streak
        const { data: recent } = await supabase
          .from('training_attendance')
          .select('attendance_status, training_sessions!inner(session_date)')
          .eq('player_id', p.id)
          .order('training_sessions(session_date)', { ascending: false })
          .limit(10);

        let streak = 0;
        for (const r of (recent || [])) {
          if (r.attendance_status === 'present') streak++;
          else break;
        }

        await supabase.from('players').update({ attendance_streak: streak }).eq('id', p.id);

        // Auto-promote if streak >= 3 and still Tryout
        const promoted = await checkAndPromotePlayer(p.id);
        if (promoted) promotions.push(`${p.first_name} ${p.last_name}`);
      }

      if (promotions.length) {
        const alert = document.getElementById('promotionAlert');
        alert.innerHTML = `<i class="fas fa-star mr-2 text-yellow-400"></i><strong>Promoted to Official Player:</strong> ${promotions.join(', ')} — 3 consecutive training days achieved!`;
        alert.classList.remove('hidden');
        setTimeout(() => alert.classList.add('hidden'), 8000);
      }

      showToast('Attendance saved!', 'green');
      await renderAttendanceTab();
    } catch (err) {
      showToast('Error: ' + err.message, 'red');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Attendance';
    }
  });

  document.getElementById('markAttendanceBtn').addEventListener('click', () => {
    document.getElementById('attendanceDateLabel').textContent = formatDate(document.getElementById('sessionDate').value);
    switchTab('attendance');
    renderAttendanceTab();
  });

  document.getElementById('sessionDate').addEventListener('change', () => {
    document.getElementById('attendanceDateLabel').textContent = formatDate(document.getElementById('sessionDate').value);
    renderAttendanceTab();
  });

  // ── PROGRESS TAB ────────────────────────────────────────────────
  async function renderProgressTab() {
    const grid = document.getElementById('progressGrid');
    grid.innerHTML = '<div class="text-slate-400 text-sm col-span-full">Loading...</div>';

    const reports = await Promise.all(players.map(p => getPlayerProgressReport(p.id).catch(() => null)));

    grid.innerHTML = reports.filter(Boolean).map(r => {
      const recColor = r.recommendation==='Starter'?'green':r.recommendation==='Bench'?'blue':r.recommendation==='Monitor'?'yellow':'red';
      const scoreColor = r.performanceScore>=75?'green':r.performanceScore>=50?'blue':r.performanceScore>=30?'yellow':'red';
      return `
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-5">
          <div class="flex items-center gap-3 mb-4">
            ${r.player?.photo_url
              ? `<img src="${r.player.photo_url}" class="w-12 h-12 rounded-full object-cover border border-slate-600">`
              : `<div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center text-slate-400"><i class="fas fa-user text-lg"></i></div>`}
            <div>
              <div class="font-semibold">${r.player?.first_name} ${r.player?.last_name}</div>
              <div class="text-xs text-slate-400">#${r.player?.jersey_number} · ${r.player?.position}</div>
              <div class="mt-0.5">${statusBadge(r.player?.status || 'Tryout')}</div>
            </div>
          </div>

          <div class="space-y-3">
            <!-- Performance Score -->
            <div>
              <div class="flex justify-between text-xs mb-1">
                <span class="text-slate-400">Performance Score</span>
                <span class="font-semibold text-${scoreColor}-400">${r.performanceScore}/100</span>
              </div>
              <div class="w-full bg-slate-700 rounded-full h-2">
                <div class="bg-${scoreColor}-500 h-2 rounded-full transition-all" style="width:${r.performanceScore}%"></div>
              </div>
            </div>

            <!-- Attendance Rate -->
            <div>
              <div class="flex justify-between text-xs mb-1">
                <span class="text-slate-400">Attendance Rate</span>
                <span class="font-semibold">${r.attendanceRate}%</span>
              </div>
              <div class="w-full bg-slate-700 rounded-full h-2">
                <div class="bg-blue-500 h-2 rounded-full" style="width:${r.attendanceRate}%"></div>
              </div>
            </div>

            <!-- Stats row -->
            <div class="grid grid-cols-3 gap-2 pt-1">
              <div class="bg-slate-700 rounded p-2 text-center">
                <div class="text-lg font-bold text-orange-400">${r.player?.attendance_streak || 0}</div>
                <div class="text-xs text-slate-400">Streak</div>
              </div>
              <div class="bg-slate-700 rounded p-2 text-center">
                <div class="text-lg font-bold text-blue-400">${r.presentCount}/${r.totalSessions}</div>
                <div class="text-xs text-slate-400">Sessions</div>
              </div>
              <div class="bg-slate-700 rounded p-2 text-center">
                <div class="text-lg font-bold text-purple-400">${r.stats?.games_played || 0}</div>
                <div class="text-xs text-slate-400">Games</div>
              </div>
            </div>

            <!-- Recommendation -->
            <div class="flex items-center justify-between pt-1 border-t border-slate-700">
              <span class="text-xs text-slate-400">Recommendation</span>
              <span class="px-2 py-1 rounded text-xs font-semibold bg-${recColor}-900 text-${recColor}-300">
                <i class="fas fa-${r.recommendation==='Starter'?'star':r.recommendation==='Bench'?'chair':r.recommendation==='Monitor'?'eye':'exclamation-triangle'} mr-1"></i>
                ${r.recommendation}
              </span>
            </div>

            ${r.player?.status === 'Tryout' ? `
            <div class="text-xs text-slate-400 bg-slate-700 rounded p-2">
              <i class="fas fa-info-circle mr-1 text-blue-400"></i>
              ${3 - (r.player?.attendance_streak || 0) > 0
                ? `${3 - (r.player?.attendance_streak || 0)} more consecutive day(s) to become Official Player`
                : 'Eligible for promotion!'}
            </div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── HISTORY TAB ─────────────────────────────────────────────────
  async function renderHistoryTab() {
    if (!currentTeam) return;
    const { data } = await supabase
      .from('training_attendance')
      .select(`
        attendance_status,
        players!inner(first_name, last_name, jersey_number, team_id),
        training_sessions!inner(session_date, topic)
      `)
      .eq('players.team_id', currentTeam.id)
      .order('training_sessions(session_date)', { ascending: false })
      .limit(100);

    const tbody = document.getElementById('historyBody');
    if (!data || !data.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-4 text-slate-400">No history yet.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(r => {
      const color = r.attendance_status==='present'?'green':r.attendance_status==='absent'?'red':'yellow';
      return `<tr class="hover:bg-slate-700 transition">
        <td class="px-4 py-3 text-slate-300">${formatDate(r.training_sessions?.session_date)}</td>
        <td class="px-4 py-3">${r.players?.first_name} ${r.players?.last_name} <span class="text-slate-500">#${r.players?.jersey_number}</span></td>
        <td class="px-4 py-3"><span class="px-2 py-0.5 rounded text-xs bg-${color}-900 text-${color}-300 capitalize">${r.attendance_status}</span></td>
        <td class="px-4 py-3 text-slate-400">${r.training_sessions?.topic || '—'}</td>
      </tr>`;
    }).join('');
  }

  // ── TABS ────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b.dataset.tab === name;
      b.classList.toggle('border-blue-500', active);
      b.classList.toggle('text-white', active);
      b.classList.toggle('border-transparent', !active);
      b.classList.toggle('text-slate-400', !active);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    if (name === 'progress') renderProgressTab();
    if (name === 'history') renderHistoryTab();
  }

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });

  // ── HELPERS ─────────────────────────────────────────────────────
  function statusBadge(status) {
    const map = {
      'Tryout': 'bg-yellow-900 text-yellow-300',
      'Official Player': 'bg-green-900 text-green-300',
      'Inactive': 'bg-slate-700 text-slate-400',
      'Suspended': 'bg-red-900 text-red-300'
    };
    return `<span class="px-1.5 py-0.5 rounded text-xs ${map[status]||map['Tryout']}">${status||'Tryout'}</span>`;
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  }

  function showToast(msg, color='green') {
    const t = document.createElement('div');
    t.className = `fixed top-4 right-4 bg-${color}-600 text-white px-4 py-2 rounded z-50 text-sm`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Mobile menu
  document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
    document.getElementById('overlay').classList.toggle('hidden');
  });
  document.getElementById('overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('overlay').classList.add('hidden');
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = './login.html';
  });

  init();
</script>
</body>
</html>
