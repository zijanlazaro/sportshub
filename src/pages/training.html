<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Dashboard - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-800 border-r border-slate-700 overflow-y-auto">
      <div class="p-6 border-b border-slate-700">
        <div class="flex items-center gap-3 mb-2">
          <div class="bg-blue-600 p-2 rounded-lg">
            <i class="fas fa-basketball-ball text-white"></i>
          </div>
          <h1 class="text-xl font-bold">Sports Hub</h1>
        </div>
        <p id="userRole" class="text-xs text-slate-400">Loading...</p>
      </div>

      <nav class="p-4 space-y-2">
        <a href="/src/pages/dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition">
          <i class="fas fa-chart-line mr-2"></i> Overview
        </a>
        <a href="/src/pages/dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition">
          <i class="fas fa-users mr-2"></i> Players
        </a>
        <a href="#" class="block px-4 py-2 rounded-lg bg-blue-600 text-white">
          <i class="fas fa-dumbbell mr-2"></i> Training
        </a>
        <a href="/src/pages/medical.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition">
          <i class="fas fa-hospital mr-2"></i> Medical
        </a>
        <a href="/src/pages/dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition">
          <i class="fas fa-calendar mr-2"></i> Schedule
        </a>
        <a href="/src/pages/dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-700 transition">
          <i class="fas fa-users-cog mr-2"></i> Manage Teams
        </a>
      </nav>

      <div class="p-4 border-t border-slate-700 mt-auto">
        <button id="logoutBtn" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <header class="bg-slate-800 border-b border-slate-700 p-6">
        <h1 class="text-2xl font-bold">Training Dashboard</h1>
      </header>

      <div class="p-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <!-- Players List -->
          <div class="bg-slate-800 rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Team Players</h2>
            <div id="playersList" class="space-y-2">
              <div class="text-center p-4 text-slate-400">Loading...</div>
            </div>
          </div>

          <!-- Training Records -->
          <div class="bg-slate-800 rounded-lg p-6">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-xl font-semibold">Training Records</h2>
              <button id="addTrainingBtn" class="bg-green-600 px-3 py-1 rounded text-sm hover:bg-green-700">
                <i class="fas fa-plus mr-1"></i>Add
              </button>
            </div>
            <div id="trainingList" class="space-y-2">
              <div class="text-center p-4 text-slate-400">Select a player</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Training Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-slate-800 rounded-lg p-6 w-full max-w-md">
      <h3 class="text-lg font-semibold mb-4">Add Training Record</h3>
      <form id="addForm">
        <div class="mb-3">
          <label class="block text-sm mb-1">Player</label>
          <select id="playerSelect" class="w-full bg-slate-700 border border-slate-600 rounded p-2" required>
            <option value="">Select Player...</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm mb-1">Date</label>
          <input type="date" id="trainingDate" class="w-full bg-slate-700 border border-slate-600 rounded p-2" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm mb-1">Time</label>
          <input type="time" id="trainingTime" class="w-full bg-slate-700 border border-slate-600 rounded p-2">
        </div>
        <div class="mb-3">
          <label class="block text-sm mb-1">Type</label>
          <select id="trainingType" class="w-full bg-slate-700 border border-slate-600 rounded p-2" required>
            <option value="">Select Type...</option>
            <option value="strength">Strength Training</option>
            <option value="cardio">Cardio</option>
            <option value="skills">Skills Training</option>
            <option value="scrimmage">Scrimmage</option>
            <option value="conditioning">Conditioning</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm mb-1">Location</label>
          <input type="text" id="trainingLocation" class="w-full bg-slate-700 border border-slate-600 rounded p-2" placeholder="Training facility">
        </div>
        <div class="mb-3">
          <label class="block text-sm mb-1">Notes</label>
          <textarea id="trainingNotes" class="w-full bg-slate-700 border border-slate-600 rounded p-2" rows="2"></textarea>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="bg-green-600 px-4 py-2 rounded hover:bg-green-700">Add</button>
          <button type="button" id="cancelBtn" class="bg-slate-600 px-4 py-2 rounded hover:bg-slate-700">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabaseClient.js';

    let currentUser = null;
    let currentTeam = null;
    let players = [];
    let selectedPlayerId = null;

    async function init() {
      try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          window.location.href = '/src/pages/login.html';
          return;
        }
        currentUser = user;
        
        await loadUserTeam();
        await loadPlayers();
        document.getElementById('trainingDate').value = new Date().toISOString().split('T')[0];
      } catch (error) {
        console.error('Init error:', error);
      }
    }

    async function loadUserTeam() {
      try {
        const { data: userProfile } = await supabase
          .from('users')
          .select('team_id, role, first_name, last_name')
          .eq('id', currentUser.id)
          .single();
        
        if (userProfile) {
          document.getElementById('userRole').textContent = (userProfile.role || 'user').toUpperCase();
          
          if (userProfile.team_id) {
            const { data: team } = await supabase
              .from('teams')
              .select('*')
              .eq('id', userProfile.team_id)
              .single();
            currentTeam = team;
          }
        }
      } catch (error) {
        console.error('Load user team error:', error);
      }
    }

    async function loadPlayers() {
      try {
        if (!currentTeam) {
          document.getElementById('playersList').innerHTML = '<div class="text-slate-400 p-4">No team assigned</div>';
          return;
        }

        const { data } = await supabase
          .from('players')
          .select('*')
          .eq('team_id', currentTeam.id)
          .order('jersey_number');
        
        players = data || [];
        
        const container = document.getElementById('playersList');
        const select = document.getElementById('playerSelect');
        
        if (players.length === 0) {
          container.innerHTML = '<div class="text-slate-400 p-4">No players found</div>';
          return;
        }
        
        container.innerHTML = players.map(p => `
          <div class="bg-slate-700 p-3 rounded cursor-pointer hover:bg-slate-600" onclick="selectPlayer('${p.id}')">
            <div class="font-medium">${p.first_name} ${p.last_name}</div>
            <div class="text-sm text-slate-400">#${p.jersey_number} - ${p.position}</div>
          </div>
        `).join('');
        
        select.innerHTML = '<option value="">Select Player...</option>' + 
          players.map(p => `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`).join('');
      } catch (error) {
        console.error('Load players error:', error);
        document.getElementById('playersList').innerHTML = '<div class="text-red-400 p-4">Error loading players</div>';
      }
    }

    async function selectPlayer(playerId) {
      selectedPlayerId = playerId;
      
      // Highlight selected player
      document.querySelectorAll('#playersList > div').forEach(div => {
        div.classList.remove('bg-blue-600');
        div.classList.add('bg-slate-700');
      });
      event.target.closest('div').classList.remove('bg-slate-700');
      event.target.closest('div').classList.add('bg-blue-600');
      
      await loadTrainingRecords(playerId);
    }

    async function loadTrainingRecords(playerId) {
      try {
        const { data } = await supabase
          .from('training_sessions')
          .select(`
            *,
            training_attendance!inner(player_id, notes)
          `)
          .eq('training_attendance.player_id', playerId)
          .order('session_date', { ascending: false });
        
        const container = document.getElementById('trainingList');
        const records = data || [];
        
        if (records.length === 0) {
          container.innerHTML = '<div class="text-slate-400 p-4">No training records</div>';
          return;
        }
        
        container.innerHTML = records.map(r => `
          <div class="bg-slate-700 p-3 rounded">
            <div class="flex justify-between items-start">
              <div class="flex-1">
                <div class="font-medium">${r.topic || 'Training Session'}</div>
                <div class="text-sm text-slate-400">
                  ${new Date(r.session_date).toLocaleDateString()}
                  ${r.session_time ? ` at ${r.session_time}` : ''}
                </div>
                <div class="text-sm text-slate-400">${r.location || 'No location'}</div>
                ${r.notes ? `<div class="text-sm mt-1">${r.notes}</div>` : ''}
              </div>
              <button onclick="deleteTraining('${r.id}')" class="text-red-400 hover:text-red-300 ml-2">
                <i class="fas fa-trash text-sm"></i>
              </button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Load training records error:', error);
        document.getElementById('trainingList').innerHTML = '<div class="text-red-400 p-4">Error loading records</div>';
      }
    }

    // Event listeners
    document.getElementById('addTrainingBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.remove('hidden');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.add('hidden');
    });

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const playerId = document.getElementById('playerSelect').value;
        
        // Create training session
        const { data: session, error: sessionError } = await supabase
          .from('training_sessions')
          .insert({
            team_id: currentTeam.id,
            created_by: currentUser.id,
            session_date: document.getElementById('trainingDate').value,
            session_time: document.getElementById('trainingTime').value || null,
            location: document.getElementById('trainingLocation').value || null,
            topic: document.getElementById('trainingType').value,
            notes: document.getElementById('trainingNotes').value || null
          })
          .select()
          .single();
        
        if (sessionError) throw sessionError;
        
        // Create attendance record
        const { error: attendanceError } = await supabase
          .from('training_attendance')
          .insert({
            training_session_id: session.id,
            player_id: playerId,
            attendance_status: 'present',
            notes: document.getElementById('trainingNotes').value || null
          });
        
        if (attendanceError) throw attendanceError;
        
        document.getElementById('addModal').classList.add('hidden');
        document.getElementById('addForm').reset();
        document.getElementById('trainingDate').value = new Date().toISOString().split('T')[0];
        
        if (selectedPlayerId) {
          await loadTrainingRecords(selectedPlayerId);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await supabase.auth.signOut();
        window.location.href = '/src/pages/login.html';
      } catch (error) {
        console.error('Logout error:', error);
      }
    });

    window.selectPlayer = selectPlayer;
    
    window.deleteTraining = async (sessionId) => {
      if (!confirm('Delete this training record?')) return;
      
      try {
        // Delete attendance first
        await supabase
          .from('training_attendance')
          .delete()
          .eq('training_session_id', sessionId)
          .eq('player_id', selectedPlayerId);
        
        // Check if other players attended
        const { data: otherAttendance } = await supabase
          .from('training_attendance')
          .select('id')
          .eq('training_session_id', sessionId);
        
        // If no other attendance, delete session
        if (!otherAttendance || otherAttendance.length === 0) {
          await supabase.from('training_sessions').delete().eq('id', sessionId);
        }
        
        if (selectedPlayerId) {
          await loadTrainingRecords(selectedPlayerId);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    init();
  </script>
</body>
</html>
