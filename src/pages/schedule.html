<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-3xl font-bold">Schedule & Events</h1>
          <p class="text-slate-400">Manage team calendar and events</p>
        </div>
        <div class="flex gap-4">
          <button id="addEventBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">
            <i class="fas fa-plus mr-2"></i> Add Event
          </button>
          <a href="./dashboard.html" class="bg-slate-600 hover:bg-slate-700 px-4 py-2 rounded-lg transition">
            <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
          </a>
        </div>
      </div>

      <!-- Calendar + Upcoming -->
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Calendar -->
        <div class="lg:col-span-3 bg-slate-800 rounded-lg border border-slate-700 p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">Calendar</h2>
            <div class="flex gap-2 items-center">
              <button id="prevMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-left"></i>
              </button>
              <span id="currentMonth" class="px-4 py-1 bg-slate-700 rounded font-medium min-w-[140px] text-center"></span>
              <button id="nextMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
        </div>

        <!-- Upcoming Events -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
          <h3 class="text-lg font-semibold mb-4">Upcoming Events</h3>
          <div id="upcomingEvents" class="space-y-3">
            <p class="text-slate-400 text-sm">Loading…</p>
          </div>
        </div>
      </div>

      <!-- All Events -->
      <div class="mt-6 bg-slate-800 rounded-lg border border-slate-700 p-6">
        <h3 class="text-lg font-semibold mb-4">All Events</h3>
        <div id="eventsList" class="space-y-3">
          <p class="text-slate-400 text-sm">Loading…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Event Modal -->
  <div id="eventModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-md mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Add New Event</h3>
        <button id="closeModal" class="text-slate-400 hover:text-white text-xl">&times;</button>
      </div>
      <form id="eventForm" class="space-y-4">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Title *</label>
          <input type="text" id="eventTitle" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Event title">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Type *</label>
            <select id="eventType" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="game">Game</option>
              <option value="training">Training</option>
              <option value="meeting">Meeting</option>
              <option value="tournament">Tournament</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Date *</label>
            <input type="date" id="eventDate" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Time</label>
            <input type="time" id="eventTime" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Location</label>
            <input type="text" id="eventLocation" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Venue">
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Description</label>
          <textarea id="eventDescription" rows="2" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Optional details"></textarea>
        </div>
        <div id="formError" class="text-red-400 text-sm hidden"></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition font-medium">
            Save Event
          </button>
          <button type="button" id="cancelModal" class="flex-1 bg-slate-600 hover:bg-slate-700 py-2 rounded-lg transition">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://guyppjhpjfzrfxldltjz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1eXBwamhwamZ6cmZ4bGRsdGp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MDI1OTIsImV4cCI6MjA4NDQ3ODU5Mn0.6hUP3Ur2FYxBtZCb8SYz1cWq8VnIuzhdxvT1-tAtIC4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentDate = new Date();
    let events = [];

    const TYPE_COLORS = {
      game:            'bg-blue-500',
      training:        'bg-green-500',
      meeting:         'bg-yellow-500',
      tournament:      'bg-purple-500',
      match:           'bg-orange-500',
      medical_checkup: 'bg-red-500',
      other:           'bg-slate-500',
    };

    const TYPE_BADGES = {
      game:            'bg-blue-900 text-blue-300',
      training:        'bg-green-900 text-green-300',
      meeting:         'bg-yellow-900 text-yellow-300',
      tournament:      'bg-purple-900 text-purple-300',
      match:           'bg-orange-900 text-orange-300',
      medical_checkup: 'bg-red-900 text-red-300',
      other:           'bg-slate-700 text-slate-300',
    };

    async function loadEvents() {
      try {
        const { data, error } = await supabase
          .from('events')
          .select('*')
          .order('event_date', { ascending: true });
        events = error ? [] : (data || []);
      } catch (e) {
        console.error('Failed to load events:', e);
        events = [];
      }
      renderCalendar();
      renderUpcoming();
      renderAllEvents();
    }

    function renderCalendar() {
      const monthNames = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];

      document.getElementById('currentMonth').textContent =
        `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Day headers
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'p-2 text-center text-slate-400 font-medium text-xs';
        el.textContent = d;
        grid.appendChild(el);
      });

      const today = new Date();
      today.setHours(0,0,0,0);

      for (let i = 0; i < 42; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);

        const dateStr = date.toISOString().split('T')[0];
        const dayEvents = events.filter(e => e.event_date === dateStr);
        const isCurrentMonth = date.getMonth() === currentDate.getMonth();
        const isToday = date.getTime() === today.getTime();

        const el = document.createElement('div');
        el.className = `p-1 text-center rounded transition min-h-[52px] flex flex-col items-center ${
          isCurrentMonth ? 'text-white hover:bg-slate-700 cursor-pointer' : 'text-slate-600'
        } ${isToday ? 'ring-2 ring-blue-500 bg-slate-700' : ''}`;

        let dotsHtml = '';
        if (dayEvents.length > 0) {
          const dots = dayEvents.slice(0, 3).map(e =>
            `<span class="inline-block w-1.5 h-1.5 rounded-full ${TYPE_COLORS[e.event_type] || 'bg-slate-400'}"></span>`
          ).join('');
          dotsHtml = `<div class="flex gap-0.5 justify-center mt-0.5">${dots}</div>`;
        }

        el.innerHTML = `<div class="text-sm font-medium">${date.getDate()}</div>${dotsHtml}`;

        if (isCurrentMonth && dayEvents.length > 0) {
          el.title = dayEvents.map(e => e.event_title).join(', ');
        }

        grid.appendChild(el);
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      const hour = parseInt(h);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      return `${hour % 12 || 12}:${m} ${ampm}`;
    }

    function renderUpcoming() {
      const container = document.getElementById('upcomingEvents');
      const today = new Date().toISOString().split('T')[0];
      const upcoming = events
        .filter(e => e.event_date >= today)
        .slice(0, 5);

      if (upcoming.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">No upcoming events</p>';
        return;
      }

      container.innerHTML = upcoming.map(e => `
        <div class="bg-slate-700 rounded-lg p-3">
          <div class="flex items-start gap-2">
            <span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${TYPE_COLORS[e.event_type] || 'bg-slate-400'}"></span>
            <div class="min-w-0">
              <p class="font-medium text-sm truncate">${e.event_title}</p>
              <p class="text-slate-400 text-xs">${formatDate(e.event_date)}${e.event_time ? ' · ' + formatTime(e.event_time) : ''}</p>
              ${e.location ? `<p class="text-slate-500 text-xs truncate">${e.location}</p>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderAllEvents() {
      const container = document.getElementById('eventsList');

      if (events.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">No events found</p>';
        return;
      }

      container.innerHTML = events.map(e => `
        <div class="bg-slate-700 rounded-lg p-4 flex flex-col sm:flex-row sm:items-center gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold">${e.event_title}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${TYPE_BADGES[e.event_type] || 'bg-slate-600 text-slate-300'} capitalize">${e.event_type.replace('_', ' ')}</span>
            </div>
            <div class="text-slate-400 text-sm mt-1 flex flex-wrap gap-x-4 gap-y-1">
              <span><i class="fas fa-calendar mr-1"></i>${formatDate(e.event_date)}${e.event_time ? ' at ' + formatTime(e.event_time) : ''}</span>
              ${e.location ? `<span><i class="fas fa-map-marker-alt mr-1"></i>${e.location}</span>` : ''}
            </div>
            ${e.event_description ? `<p class="text-slate-500 text-sm mt-1 line-clamp-2">${e.event_description}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    // Calendar navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Modal
    const modal = document.getElementById('eventModal');
    const openModal = () => {
      document.getElementById('eventForm').reset();
      document.getElementById('formError').classList.add('hidden');
      // Default date to today
      document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
      modal.classList.remove('hidden');
    };
    const closeModal = () => modal.classList.add('hidden');

    document.getElementById('addEventBtn').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      errEl.classList.add('hidden');

      const { data: { user } } = await supabase.auth.getUser();

      const payload = {
        event_title:       document.getElementById('eventTitle').value.trim(),
        event_type:        document.getElementById('eventType').value,
        event_date:        document.getElementById('eventDate').value,
        event_time:        document.getElementById('eventTime').value || null,
        location:          document.getElementById('eventLocation').value.trim() || null,
        event_description: document.getElementById('eventDescription').value.trim() || null,
        created_by:        user?.id || null,
        status:            'upcoming',
      };

      const { error } = await supabase.from('events').insert(payload);

      if (error) {
        errEl.textContent = 'Failed to save event: ' + error.message;
        errEl.classList.remove('hidden');
        return;
      }

      closeModal();
      await loadEvents();
    });

    // Init — fallback to "no events" if Supabase never responds
    const fallback = setTimeout(() => {
      document.getElementById('upcomingEvents').innerHTML = '<p class="text-slate-400 text-sm">No upcoming events</p>';
      document.getElementById('eventsList').innerHTML = '<p class="text-slate-400 text-sm">No events found</p>';
      renderCalendar();
    }, 5000);

    loadEvents().then(() => clearTimeout(fallback));
  </script>
</body>
</html>
