<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Sports Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="flex h-screen">
    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" class="lg:hidden fixed top-4 left-4 z-50 bg-slate-800 p-2 rounded-lg">
      <i class="fas fa-bars text-white"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 overflow-y-auto fixed lg:relative h-full z-40 transform -translate-x-full lg:translate-x-0 transition-transform">
      <div class="p-6 border-b border-slate-700">
        <div class="flex items-center gap-3 mb-2">
          <div class="bg-blue-600 p-2 rounded-lg">
            <i class="fas fa-basketball-ball text-white"></i>
          </div>
          <h1 class="text-xl font-bold">Sports Hub</h1>
        </div>
        <p id="userRole" class="text-xs text-slate-400">Loading...</p>
      </div>

      <nav class="p-4 space-y-2">
        <a href="./dashboard.html" class="nav-link block px-4 py-2 rounded-lg hover:bg-slate-700 transition" data-page="overview">
          <i class="fas fa-chart-line mr-2"></i> Overview
        </a>
        <a href="./dashboard.html" class="nav-link block px-4 py-2 rounded-lg hover:bg-slate-700 transition" data-page="players">
          <i class="fas fa-users mr-2"></i> Players
        </a>
        <a href="./dashboard.html" class="nav-link block px-4 py-2 rounded-lg hover:bg-slate-700 transition" data-page="training">
          <i class="fas fa-dumbbell mr-2"></i> Training
        </a>
        <a href="./dashboard.html" class="nav-link block px-4 py-2 rounded-lg hover:bg-slate-700 transition" data-page="medical">
          <i class="fas fa-hospital mr-2"></i> Medical
        </a>
        <a href="./schedule.html" class="nav-link active block px-4 py-2 rounded-lg bg-blue-600 text-white" data-page="schedule">
          <i class="fas fa-calendar mr-2"></i> Schedule
        </a>
        <a href="./dashboard.html" class="nav-link block px-4 py-2 rounded-lg hover:bg-slate-700 transition" data-page="teams">
          <i class="fas fa-users-cog mr-2"></i> Manage Teams
        </a>
      </nav>

      <div class="p-4 border-t border-slate-700 mt-auto">
        <button id="logoutBtn" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="overlay" class="lg:hidden fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto lg:ml-0">
      <!-- Top Bar -->
      <div class="bg-slate-800 border-b border-slate-700 p-4 lg:p-6 pl-16 lg:pl-6 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
          <h2 id="pageTitle" class="text-xl lg:text-2xl font-bold">Schedule & Events</h2>
        </div>
          <div class="flex items-center gap-2 lg:gap-4">
            <button id="darkModeToggle" class="text-slate-400 hover:text-white">
              <i class="fas fa-moon"></i>
            </button>
            <div id="userMenu" class="relative">
              <button id="userMenuBtn" class="flex items-center gap-2 px-2 lg:px-4 py-2 hover:bg-slate-700 rounded-lg transition">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-blue-600 rounded-full flex items-center justify-center">
                  <i class="fas fa-user text-white text-sm"></i>
                </div>
                <span id="userName" class="hidden lg:block">User</span>
              </button>
            <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-slate-800 rounded-lg shadow-lg border border-slate-700">
              <a href="/src/pages/profile.html" class="block px-4 py-2 text-sm hover:bg-slate-700 rounded-t-lg">
                <i class="fas fa-user-cog mr-2"></i> Profile Settings
              </a>
              <button id="logoutFromMenu" class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700 rounded-b-lg">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Page Content -->
      <div class="p-4 lg:p-6">
        <div class="max-w-6xl mx-auto">
          <!-- Add Event Button -->
          <div class="mb-6">
            <button id="addEventBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">
              <i class="fas fa-plus mr-2"></i> Add Event
            </button>
          </div>

      <!-- Calendar + Upcoming -->
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Calendar -->
        <div class="lg:col-span-3 bg-slate-800 rounded-lg border border-slate-700 p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">Calendar</h2>
            <div class="flex gap-2 items-center">
              <button id="prevMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-left"></i>
              </button>
              <span id="currentMonth" class="px-4 py-1 bg-slate-700 rounded font-medium min-w-[140px] text-center"></span>
              <button id="nextMonth" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
        </div>

        <!-- Upcoming Events -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
          <h3 class="text-lg font-semibold mb-4">Upcoming Events</h3>
          <div id="upcomingEvents" class="space-y-3">
            <p class="text-slate-400 text-sm">Loading…</p>
          </div>
        </div>
      </div>

      <!-- All Events -->
      <div class="mt-6 bg-slate-800 rounded-lg border border-slate-700 p-6">
        <h3 class="text-lg font-semibold mb-4">All Events</h3>
        <div id="eventsList" class="space-y-3">
          <p class="text-slate-400 text-sm">Loading…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Event Modal -->
  <div id="eventModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-md mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Add New Event</h3>
        <button id="closeModal" class="text-slate-400 hover:text-white text-xl">&times;</button>
      </div>
      <form id="eventForm" class="space-y-4">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Title *</label>
          <input type="text" id="eventTitle" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Event title">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Type *</label>
            <select id="eventType" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
              <option value="game">Game</option>
              <option value="training">Training</option>
              <option value="meeting">Meeting</option>
              <option value="tournament">Tournament</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Date *</label>
            <input type="date" id="eventDate" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Time</label>
            <input type="time" id="eventTime" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Location</label>
            <input type="text" id="eventLocation" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Venue">
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Description</label>
          <textarea id="eventDescription" rows="2" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Optional details"></textarea>
        </div>
        <div id="formError" class="text-red-400 text-sm hidden"></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition font-medium">
            Save Event
          </button>
          <button type="button" id="cancelModal" class="flex-1 bg-slate-600 hover:bg-slate-700 py-2 rounded-lg transition">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://guyppjhpjfzrfxldltjz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1eXBwamhwamZ6cmZ4bGRsdGp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MDI1OTIsImV4cCI6MjA4NDQ3ODU5Mn0.6hUP3Ur2FYxBtZCb8SYz1cWq8VnIuzhdxvT1-tAtIC4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentDate = new Date();
    let events = [];

    const TYPE_COLORS = {
      game:            'bg-blue-500',
      training:        'bg-green-500',
      meeting:         'bg-yellow-500',
      tournament:      'bg-purple-500',
      match:           'bg-orange-500',
      medical_checkup: 'bg-red-500',
      other:           'bg-slate-500',
    };

    const TYPE_BADGES = {
      game:            'bg-blue-900 text-blue-300',
      training:        'bg-green-900 text-green-300',
      meeting:         'bg-yellow-900 text-yellow-300',
      tournament:      'bg-purple-900 text-purple-300',
      match:           'bg-orange-900 text-orange-300',
      medical_checkup: 'bg-red-900 text-red-300',
      other:           'bg-slate-700 text-slate-300',
    };

    // Loading state management
    function showLoading() {
      document.getElementById('upcomingEvents').innerHTML = '<p class="text-slate-400 text-sm">Loading events...</p>';
      document.getElementById('eventsList').innerHTML = '<p class="text-slate-400 text-sm">Loading events...</p>';
    }

    async function loadEvents() {
      showLoading();
      try {
        const { data, error } = await supabase
          .from('events')
          .select('*')
          .order('event_date', { ascending: true });
        
        if (error) {
          console.error('Failed to load events:', error);
          events = [];
        } else {
          events = data || [];
          console.log('Loaded events:', events.length, 'events');
        }
      } catch (e) {
        console.error('Failed to load events:', e);
        events = [];
      }
      
      renderCalendar();
      renderUpcoming();
      renderAllEvents();
    }

    function renderCalendar() {
      const monthNames = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];

      document.getElementById('currentMonth').textContent =
        `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Day headers
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'p-2 text-center text-slate-400 font-medium text-xs';
        el.textContent = d;
        grid.appendChild(el);
      });

      const today = new Date();
      today.setHours(0,0,0,0);

      for (let i = 0; i < 42; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);

        const dateStr = date.toISOString().split('T')[0];
        const dayEvents = events.filter(e => e.event_date === dateStr);
        const isCurrentMonth = date.getMonth() === currentDate.getMonth();
        const isToday = date.getTime() === today.getTime();

        const el = document.createElement('div');
        el.className = `p-1 text-center rounded transition min-h-[52px] flex flex-col items-center ${
          isCurrentMonth ? 'text-white hover:bg-slate-700 cursor-pointer' : 'text-slate-600'
        } ${isToday ? 'ring-2 ring-blue-500 bg-slate-700' : ''}`;

        let dotsHtml = '';
        if (dayEvents.length > 0) {
          const dots = dayEvents.slice(0, 3).map(e =>
            `<span class="inline-block w-1.5 h-1.5 rounded-full ${TYPE_COLORS[e.event_type] || 'bg-slate-400'}"></span>`
          ).join('');
          dotsHtml = `<div class="flex gap-0.5 justify-center mt-0.5">${dots}</div>`;
        }

        el.innerHTML = `<div class="text-sm font-medium">${date.getDate()}</div>${dotsHtml}`;

        if (isCurrentMonth && dayEvents.length > 0) {
          el.title = dayEvents.map(e => e.event_title || e.title).join(', ');
        }

        grid.appendChild(el);
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      const hour = parseInt(h);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      return `${hour % 12 || 12}:${m} ${ampm}`;
    }

    function renderUpcoming() {
      const container = document.getElementById('upcomingEvents');
      const today = new Date().toISOString().split('T')[0];
      const upcoming = events
        .filter(e => e.event_date >= today)
        .slice(0, 5);

      if (upcoming.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">No upcoming events</p>';
        return;
      }

      container.innerHTML = upcoming.map(e => `
        <div class="bg-slate-700 rounded-lg p-3">
          <div class="flex items-start gap-2">
            <span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${TYPE_COLORS[e.event_type] || 'bg-slate-400'}"></span>
            <div class="min-w-0">
              <p class="font-medium text-sm truncate">${e.event_title || e.title}</p>
              <p class="text-slate-400 text-xs">${formatDate(e.event_date)}${e.event_time ? ' · ' + formatTime(e.event_time) : ''}</p>
              ${e.location ? `<p class="text-slate-500 text-xs truncate">${e.location}</p>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderAllEvents() {
      const container = document.getElementById('eventsList');

      if (events.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm">No events found</p>';
        return;
      }

      container.innerHTML = events.map(e => `
        <div class="bg-slate-700 rounded-lg p-4 flex flex-col sm:flex-row sm:items-center gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold">${e.event_title || e.title}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${TYPE_BADGES[e.event_type] || 'bg-slate-600 text-slate-300'} capitalize">${e.event_type.replace('_', ' ')}</span>
            </div>
            <div class="text-slate-400 text-sm mt-1 flex flex-wrap gap-x-4 gap-y-1">
              <span><i class="fas fa-calendar mr-1"></i>${formatDate(e.event_date)}${e.event_time ? ' at ' + formatTime(e.event_time) : ''}</span>
              ${e.location ? `<span><i class="fas fa-map-marker-alt mr-1"></i>${e.location}</span>` : ''}
            </div>
            ${e.event_description || e.description ? `<p class="text-slate-500 text-sm mt-1 line-clamp-2">${e.event_description || e.description}</p>` : ''}
          </div>
          <div class="flex gap-2">
            <button onclick="editEvent('${e.id}')" class="text-blue-400 hover:text-blue-300 transition" title="Edit Event">
              <i class="fas fa-edit"></i>
            </button>
            <button onclick="deleteEvent('${e.id}')" class="text-red-400 hover:text-red-300 transition" title="Delete Event">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    // Calendar navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Modal
    const modal = document.getElementById('eventModal');
    const openModal = () => {
      document.getElementById('eventForm').reset();
      document.getElementById('formError').classList.add('hidden');
      // Default date to today
      document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
      modal.classList.remove('hidden');
    };
    const closeModal = () => modal.classList.add('hidden');

    document.getElementById('addEventBtn').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      errEl.classList.add('hidden');

      // Show loading state
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Saving...';
      submitBtn.disabled = true;

      try {
        const { data: { user } } = await supabase.auth.getUser();

        const payload = {
          event_title:       document.getElementById('eventTitle').value.trim(),
          event_type:        document.getElementById('eventType').value,
          event_date:        document.getElementById('eventDate').value,
          event_time:        document.getElementById('eventTime').value || null,
          location:          document.getElementById('eventLocation').value.trim() || null,
          event_description: document.getElementById('eventDescription').value.trim() || null,
          created_by:        user?.id || null,
        };

        const { error } = await supabase.from('events').insert(payload);

        if (error) {
          errEl.textContent = 'Failed to save event: ' + error.message;
          errEl.classList.remove('hidden');
          return;
        }

        closeModal();
        showLoading(); // Show loading while refreshing
        await loadEvents();
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    // Edit event function
    async function editEvent(eventId) {
      const event = events.find(e => e.id === eventId);
      if (!event) {
        alert('Event not found');
        return;
      }

      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
      modal.innerHTML = `
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-md mx-4">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">Edit Event</h3>
            <button onclick="this.closest('.fixed').remove()" class="text-slate-400 hover:text-white text-xl">&times;</button>
          </div>
          <form id="editEventForm" class="space-y-4">
            <div>
              <label class="block text-sm text-slate-400 mb-1">Title *</label>
              <input type="text" id="editEventTitle" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" value="${event.event_title || event.title}">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm text-slate-400 mb-1">Type *</label>
                <select id="editEventType" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white">
                  <option value="game" ${event.event_type === 'game' ? 'selected' : ''}>Game</option>
                  <option value="training" ${event.event_type === 'training' ? 'selected' : ''}>Training</option>
                  <option value="meeting" ${event.event_type === 'meeting' ? 'selected' : ''}>Meeting</option>
                  <option value="tournament" ${event.event_type === 'tournament' ? 'selected' : ''}>Tournament</option>
                  <option value="other" ${event.event_type === 'other' ? 'selected' : ''}>Other</option>
                </select>
              </div>
              <div>
                <label class="block text-sm text-slate-400 mb-1">Date *</label>
                <input type="date" id="editEventDate" required class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" value="${event.event_date}">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm text-slate-400 mb-1">Time</label>
                <input type="time" id="editEventTime" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" value="${event.event_time || ''}">
              </div>
              <div>
                <label class="block text-sm text-slate-400 mb-1">Location</label>
                <input type="text" id="editEventLocation" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" value="${event.location || ''}" placeholder="Venue">
              </div>
            </div>
            <div>
              <label class="block text-sm text-slate-400 mb-1">Description</label>
              <textarea id="editEventDescription" rows="2" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="Optional details">${event.event_description || event.description || ''}</textarea>
            </div>
            <div id="editFormError" class="text-red-400 text-sm hidden"></div>
            <div class="flex gap-3 pt-2">
              <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition font-medium">
                Update Event
              </button>
              <button type="button" onclick="this.closest('.fixed').remove()" class="flex-1 bg-slate-600 hover:bg-slate-700 py-2 rounded-lg transition">
                Cancel
              </button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      
      modal.querySelector('#editEventForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('editFormError');
        errEl.classList.add('hidden');

        // Show loading state
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Updating...';
        submitBtn.disabled = true;

        try {
          const payload = {
            event_title:       document.getElementById('editEventTitle').value.trim(),
            event_type:        document.getElementById('editEventType').value,
            event_date:        document.getElementById('editEventDate').value,
            event_time:        document.getElementById('editEventTime').value || null,
            location:          document.getElementById('editEventLocation').value.trim() || null,
            event_description: document.getElementById('editEventDescription').value.trim() || null,
          };

          const { error } = await supabase
            .from('events')
            .update(payload)
            .eq('id', eventId);

          if (error) {
            errEl.textContent = 'Failed to update event: ' + error.message;
            errEl.classList.remove('hidden');
            return;
          }

          modal.remove();
          showLoading(); // Show loading while refreshing
          await loadEvents();
        } finally {
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        }
      });
    }

    // Delete event function
    async function deleteEvent(eventId) {
      if (!confirm('Are you sure you want to delete this event?')) return;
      
      showLoading(); // Show loading while deleting
      
      const { error } = await supabase
        .from('events')
        .delete()
        .eq('id', eventId);

      if (error) {
        alert('Failed to delete event: ' + error.message);
        await loadEvents(); // Reload to show original state
        return;
      }

      await loadEvents();
    }

    // Make functions globally available
    window.editEvent = editEvent;
    window.deleteEvent = deleteEvent;

    // Sidebar navigation functionality
    // User menu toggle
    document.getElementById('userMenuBtn').addEventListener('click', () => {
      const dropdown = document.getElementById('userDropdown');
      dropdown.classList.toggle('hidden');
    });

    // Mobile menu functionality
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    mobileMenuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    });

    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', (e) => {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('mobileMenuBtn');
      if (sidebar && toggle && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#userMenu')) {
        document.getElementById('userDropdown').classList.add('hidden');
      }
    });

    // Logout functionality
    const logoutFunction = async () => {
      try {
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
        window.location.href = '/src/pages/login.html';
      } catch (error) {
        console.error('Logout failed:', error);
      }
    };

    document.getElementById('logoutBtn').addEventListener('click', logoutFunction);
    document.getElementById('logoutFromMenu').addEventListener('click', logoutFunction);

    // Init — fallback to "no events" if Supabase never responds
    const fallback = setTimeout(() => {
      document.getElementById('upcomingEvents').innerHTML = '<p class="text-slate-400 text-sm">No upcoming events</p>';
      document.getElementById('eventsList').innerHTML = '<p class="text-slate-400 text-sm">No events found</p>';
      renderCalendar();
    }, 5000);

    loadEvents().then(() => clearTimeout(fallback));
  </script>
</body>
</html>
